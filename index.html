<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
    }
    #app {
      text-align: center;
      padding: 32px 24px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
      max-width: 320px;
      width: 90%;
    }
    img.avatar { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 12px; object-fit: cover; }
    h3      { font-size: 18px; margin-bottom: 16px; color: #333; }
    .step   { color: #aaa;     font-size: 14px; }
    .success{ color: #06c755;  font-size: 15px; font-weight: bold; }
    .pending{ color: #f5a623;  font-size: 15px; font-weight: bold; }
    .error  { color: #e00;     font-size: 15px; font-weight: bold; }
    .note   { color: #999;     font-size: 13px; margin-top: 8px; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="app"><p class="step">⏳ กำลังโหลด...</p></div>

  <script>
    const LIFF_ID     = "2009976093-fto5ryrn";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOC2zCw-n1p14mogXt5QaDZfWOhmgDSIgwT_Atq6q3Q1UZODNeBo05cP1_OW9Ym53X/exec";

    const post = async body => {
      const res = await fetch(WEB_APP_URL, {
        method:  "POST",
        headers: { "Content-Type": "text/plain" },
        body:    JSON.stringify(body)
      });
      return res.json();
    };

    const setHTML = html => document.getElementById("app").innerHTML = html;

    async function main() {
      try {
        setHTML(`<p class="step">⏳ กำลังเชื่อมต่อ...</p>`);
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        const profile = await liff.getProfile();
        const avatar  = `<img class="avatar" src="${profile.pictureUrl}" alt="avatar">`;
        const name    = `<h3>${profile.displayName}</h3>`;

        setHTML(avatar + name + `<p class="step">⏳ กำลังตรวจสอบข้อมูล...</p>`);

        // บันทึก user (ถ้าใหม่ → pending อัตโนมัติ)
        await post({
          action:      "register",
          userId:      profile.userId,
          displayName: profile.displayName,
          message:     "LIFF Register"
        });

        // เช็คสิทธิ์ + ผูก Rich Menu
        setHTML(avatar + name + `<p class="step">⏳ กำลังตรวจสอบสิทธิ์...</p>`);
        const result = await post({ action: "checkAndLink", userId: profile.userId });

        if (result.status === "error") throw new Error(result.message);

        if (result.permission) {
          setHTML(avatar + name + `
            <p class="success">✅ ยืนยันสิทธิ์สำเร็จ!</p>
            <p class="note">กำลังกลับสู่หน้าหลัก...</p>
          `);
          if (liff.isInClient()) setTimeout(() => liff.closeWindow(), 1500);

        } else if (result.reason === "not_found") {
          setHTML(avatar + name + `
            <p class="error">❌ ไม่พบข้อมูลในระบบ</p>
            <p class="note">กรุณาติดต่อเจ้าหน้าที่</p>
          `);
          if (liff.isInClient()) setTimeout(() => liff.closeWindow(), 2500);

        } else {
          setHTML(avatar + name + `
            <p class="pending">⏳ รอการอนุมัติ</p>
            <p class="note">ระบบได้รับข้อมูลของคุณแล้ว<br>กรุณารอเจ้าหน้าที่ตรวจสอบ</p>
          `);
          if (liff.isInClient()) setTimeout(() => liff.closeWindow(), 2500);
        }

      } catch (err) {
        setHTML(`<p class="error">❌ ${err.message}</p>`);
      }
    }

    main();
  </script>
</body>
</html>
